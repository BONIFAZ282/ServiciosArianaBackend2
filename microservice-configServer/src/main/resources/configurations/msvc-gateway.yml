eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8080

spring:
  application:
    name: msvc-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: msvc-security
          uri: lb://msvc-security
          predicates:
            - Path=/api/security/**
        - id: msvc-personal
          uri: lb://msvc-personal
          predicates:
            - Path=/api/personal/**
        - id: msvc-servicio
          uri: lb://msvc-servicio
          predicates:
            - Path=/api/servicio/**